# Conda-First: the Python side of the dual stack (FastAPI swarm, scripts, generator).
# Create:   conda env create -f environment.yml
# Activate: conda activate sjfu-catalog
#
# Zero-Trust: do NOT put secrets here. Set them via:
#   conda env config vars set -n sjfu-catalog DATABASE_URL="..."   (or use .env.local)
# Embeddings use the hosted gemini-embedding-001 API (no self-hosted GPU service) — see BUILD_PLAN §0.5.
name: sjfu-catalog
channels:
  - conda-forge
  - defaults
dependencies:
  - nodejs=20
  - python=3.12
  - pandas
  - pyarrow
  - psycopg2
  # weasyprint (+ its native cairo/pango/gdk-pixbuf stack) is pulled from conda-forge so the
  # swarm's /api/agent/render-pdf endpoint renders catalog PDFs inside the Cloud Run image.
  - weasyprint
  - pip
  - pip:
      - supabase
      - fastapi
      - uvicorn[standard]
      - pydantic
      - pyyaml
      - python-dotenv
      - python-json-logger   # JSON structured logging
      - gitpython            # git commit/branch metadata in logs
      - requests
      - google-genai         # Vertex AI (keyless) generation LLM for the swarm
      - anthropic            # swarm generation-LLM SDK (vendored src/server/main.py); Vertex shim maps onto it
      - python-docx          # committee-minutes / uploaded-doc parsing (import name: docx)
      - ruff                 # lint
      - mypy                 # type-check
      - black                # format
      - pytest               # tests
